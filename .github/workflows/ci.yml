name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Run unit tests
        run: make test XCODEBUILD_FLAGS='CODE_SIGNING_ALLOWED=NO'

      - name: Verify release build
        run: make build XCODEBUILD_FLAGS='CODE_SIGNING_ALLOWED=NO'
