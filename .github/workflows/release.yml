name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-macos-artifact:
    runs-on: macos-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build packaged macOS app
        run: make release-zip XCODEBUILD_FLAGS='CODE_SIGNING_ALLOWED=NO' ARCHIVE_BASENAME='FastMissionControl-${{ github.event.release.tag_name }}-macOS'

      - name: Resolve artifact path
        id: artifact
        run: |
          echo "path=$(make release-path ARCHIVE_BASENAME='FastMissionControl-${{ github.event.release.tag_name }}-macOS')" >> "$GITHUB_OUTPUT"
          echo "name=FastMissionControl-${{ github.event.release.tag_name }}-macOS.zip" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.path }}
          fail_on_unmatched_files: true
